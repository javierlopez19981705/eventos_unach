name: eventos_unach
description: "Aplicación para gestión de eventos universitarios UNACH"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Gestor de estado
  provider: ^6.1.2

  # Navegación
  go_router: ^14.8.1

  # Almacenamiento local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # PDF / Diploma
  pdf: ^3.11.2
  printing: ^5.13.5

  # Utilidades
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
